name: Collect Trend Data

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 09:00 KST (UTC 00:00)
  workflow_dispatch:       # 수동 실행 가능

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # 커밋 권한

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collectors
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python collectors/run_all.py

      - name: Commit data
        run: |
          git config user.name "trend-bot"
          git config user.email "trend-bot@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update trend data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
